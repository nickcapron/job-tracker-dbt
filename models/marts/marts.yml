version: 2

models:
  - name: fct_applications
    columns:
      - name: application_id
        tests:
          - unique
          - not_null
      - name: job_id
        tests:
          - not_null
      - name: status_code
        tests:
          - not_null
          - accepted_values:
              values: ['applied', 'screening', 'interview', 'offer', 'rejected', 'withdrawn']
      - name: applied_date
        tests:
          - not_null

  - name: dim_companies
    columns:
      - name: company_name
        tests:
          - not_null
          - unique

  - name: dim_application_statuses
    columns:
      - name: status_code
        tests:
          - unique
          - not_null